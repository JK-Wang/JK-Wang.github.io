<header class="site-header">
  <a class="brand" href="{{ .Site.Home.RelPermalink }}" aria-label="{{ .Site.Title }}">
    <span class="brand-mark">JK</span>
    <span>{{ .Site.Title }}</span>
  </a>
  <nav class="site-nav" aria-label="Primary navigation">
    {{ $currentPage := . }}
    {{ range .Site.Menus.main }}
      <a href="{{ .URL }}" {{ if or ($currentPage.IsMenuCurrent "main" .) (eq $currentPage.Section .Identifier) }}class="active"{{ end }}>{{ .Name }}</a>
    {{ end }}
  </nav>
</header>
